name: build-orbit-deck

# Builds the Orbit Deck Windows portable zip. The dev container cannot download
# Electron binaries (network policy), so packaging happens here where the
# runner has full internet. Grab the zip from the run's Artifacts.
on:
  workflow_dispatch:
  push:
    tags: ["deck-v*"]

jobs:
  build-win:
    runs-on: windows-latest
    defaults:
      run: { working-directory: app }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: app/package-lock.json }
      - name: Install
        run: npm ci
      - name: Package (portable zip)
        run: npm run dist:win
      - name: List artifacts
        run: dir dist
      - uses: actions/upload-artifact@v4
        with:
          name: OrbitDeck-win-portable
          path: |
            app/dist/*.zip
          retention-days: 30
